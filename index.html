<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>평화여객 - 로블록스 최고의 버스 팩션</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        /* --- CSS 스타일에 정의 (style.css에 넣으세요) --- */
        :root {
            --main-green: #2ECC71; /* 메인 연두색 */
            --sub-yellow: #F1C40F; /* 서브 노란색 */
            --dark-bg: #1A1A1A;
            --text-color: #ECF0F1;
        }

        body {
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* 네비게이션 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(26, 26, 26, 0.95);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-sizing: border-box;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--main-green);
            text-decoration: none;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--main-green);
        }

        /* Three.js 메인 배너 */
        #hero-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 80vh; /* 배너 높이 */
            z-index: -1;
        }

        .hero-section {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .hero-title {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: var(--sub-yellow);
            margin-bottom: 30px;
        }

        /* 디스코드 연결 배너 (서브 컬러) */
        .discord-banner {
            background-color: var(--sub-yellow);
            color: #333;
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            margin: 50px auto;
            max-width: 800px;
        }

        .discord-btn {
            background-color: #7289DA; /* 디스코드 색상 */
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s;
        }

        .discord-btn:hover {
            background-color: #5C6FB1;
        }

        /* 모집 팝업 (Modal) */
        .modal {
            display: none; /* 기본적으로 숨김 */
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .modal.show {
            display: block;
            opacity: 1;
        }

        .modal-content {
            background-color: #2c3e50;
            margin: 10% auto;
            padding: 30px;
            border: 2px solid var(--main-green);
            width: 80%;
            max-width: 500px;
            border-radius: 15px;
            text-align: center;
            transform: scale(0.7);
            transition: transform 0.5s ease;
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        .close-modal {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close-modal:hover {
            color: var(--sub-yellow);
        }

        .modal-title {
            color: var(--main-green);
            font-size: 2rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">평화여객</a>
        <ul class="nav-links">
            <li><a href="about.html">회사 소개</a></li>
            <li><a href="organization.html">조직도</a></li>
            <li><a href="business.html">진출 제의</a></li>
        </ul>
    </nav>

    <canvas id="hero-canvas"></canvas>
    <section class="hero-section">
        <h1 class="hero-title">안전, 그 이상의 가치</h1>
        <p class="hero-subtitle">로블록스 No.1 버스 팩션, 평화여객</p>
    </section>

    <div class="discord-banner">
        <h2>평화여객 가족이 되어주세요!</h2>
        <p>최신 소식과 운행 정보를 가장 빠르게 확인하세요.</p>
        <a href="YOUR_DISCORD_INVITE_LINK" target="_blank" class="discord-btn">
            디스코드 서버 가입하기
        </a>
    </div>

    <div id="recruitModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 class="modal-title">NOW RECRUITING</h2>
            <p>평화여객에서 신입 승무원을 모집합니다.</p>
            <p style="color: var(--sub-yellow);">모집 분야: 버스 기사, 정비사, 관리직</p>
            <p>자세한 내용은 디스코드 채널을 확인하세요!</p>
        </div>
    </div>

    <script>
        // --- JavaScript (main.js에 넣으세요) ---

        // 1. Three.js 메인 배너 효과 (간단한 Wave)
        const canvas = document.querySelector('#hero-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / (window.innerHeight * 0.8), 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight * 0.8);

        // 연두색 물결을 위한 Geometry 및 Material
        const geometry = new THREE.PlaneGeometry(10, 10, 50, 50);
        const material = new THREE.MeshBasicMaterial({ color: 0x2ECC71, wireframe: true, transparent: true, opacity: 0.3 });
        const plane = new THREE.Mesh(geometry, material);
        plane.rotation.x = -Math.PI / 2; // 평면을 눕힘
        scene.add(plane);

        // 애니메이션 함수
        function animate() {
            requestAnimationFrame(animate);

            // 물결 효과
            const positions = plane.geometry.attributes.position;
            const time = Date.now() * 0.001;

            for (let i = 0; i < positions.count; i++) {
                const x = positions.getX(i);
                const y = positions.getY(i);
                // X와 Y 좌표에 따라 Z축(높이) 값을 사인 파동으로 변화시킴
                const z = Math.sin(x * 0.5 + time) * Math.cos(y * 0.5 + time) * 0.2;
                positions.setZ(i, z);
            }
            positions.needsUpdate = true; // 지오메트리 업데이트

            renderer.render(scene, camera);
        }
        animate();

        // 창 크기 조절 대응
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / (window.innerHeight * 0.8);
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight * 0.8);
        });

        // 2. 팝업 함수
        const modal = document.getElementById('recruitModal');

        // 페이지 로드 1초 후 팝업 띄우기
        window.onload = function() {
            setTimeout(() => {
                modal.classList.add('show');
            }, 1000);
        }

        function closeModal() {
            modal.classList.remove('show');
        }

        // 팝업 바깥 클릭 시 닫기
        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
